spring.application.name=inventoryService

server.port=8082

spring.datasource.url=jdbc:mysql://localhost:3306/springkafka
spring.datasource.username=root
spring.datasource.password=Test@2026
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=inventory-group

spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer

spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
#spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.json.type.mapping=orderEvent:com.example.inventoryService.entity.orderDto
spring.kafka.consumer.properties.spring.json.trusted.packages=*

